<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>ZK Browser Bench Suite</title>
	<script src="./gnark/web/wasm_exec.js"></script>
</head>

<body>
	<main>
		<h1>ZK Browser Bench Suite</h1>
		<p>Single-page runner for Arkworks WASM and snarkjs WebAssembly proof benchmarks.</p>
		<section>
			<h2>Arkworks (Rust/WASM)</h2>
			<p><a href="./arkworks/web/" target="_blank" rel="noopener noreferrer">Arkworks page</a></p>
			<button id="run-arkworks">Run Arkworks setup</button>
		</section>
		<section>
			<h2>snarkjs (Circom/WASM)</h2>
			<p><a href="./snarkjs/web/" target="_blank" rel="noopener noreferrer">Snarkjs page</a></p>
			<button id="run-snarkjs">Run snarkjs setup</button>
		</section>
		<section>
			<h2>Gnark (Go/WASM)</h2>
			<p><a href="./gnark/web/" target="_blank" rel="noopener noreferrer">Gnark page</a></p>
			<button id="run-gnark">Run Gnark setup</button>
		</section>
		<section>
			<h2>🔥 Gnark WebGPU (Go/WASM)</h2>
			<p><a href="./gnark/webgpu/" target="_blank" rel="noopener noreferrer">Gnark WebGPU page</a></p>
			<button id="run-gnark-webgpu" onclick="window.location.href='./gnark/webgpu/'">Go to WebGPU page</button>
		</section>
		<h2>Logs</h2>
		<pre id="output"></pre>
	</main>
	<script type="module" src="./index.js"></script>
</body>

</html>
